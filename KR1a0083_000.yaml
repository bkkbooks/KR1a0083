body:
  text: 讀易考原易類提要臣等謹案讀易考原一卷元蕭漢中撰漢中字景元泰和人此書成於泰定中凡三篇一論分卦一論合卦一論卦序不敢顯攻序卦𫝊而亦不用序卦之說大㫖以圓圖乾坤坎離居四正為上經之主卦兑艮巽震居四隅為下經之主卦復按圖列說申明上經三十卦下經三十四卦多寡分合之不可易及乾坤之後受以屯䝉屯䝉之後受以需訟次序之不可紊卷後論三十六宫陰陽消長之機以互明其義漢中書不甚著明初朱升作周易旁注始采録其文附於末卷升自記稱謹節縮為上下經二圖於石而録其原文於下以廣其𫝊則是書經升編輯不盡漢中之舊今升書殘缺而漢中書反附以得存此本即從升書中録出别行者朱彝尊經義考作三卷蓋以一篇為一卷實無别本也其說雖亦出於邵氏而推闡卦序頗具精理蓋猶依經立義者以視黑白奇偶蔓衍而不可極者固有殊焉乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9994a5f712d554249c579280224623811795fb20b4692cd4a452fd0139f43162
